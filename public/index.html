    // Agent names for display
    const agentNames = {
      'general': '💬 Общий',
      'wordpress': 'WordPress',
      'seo': 'SEO',
      'content': 'Контент',
      'youtube': 'YouTube',
      'instagram': 'Instagram',
      'tiktok': 'TikTok',
      'telegram': 'Telegram',
      'facebook': 'Facebook',
      'reels': '🎬 Reels',
      'masterclass': '🎓 Мастер-класс',
      'salespage': '📄 Лендинг',
      'traffic': '🚀 Трафик'
    };

    const currentAgentLabel = document.getElementById('currentAgentLabel');
    const socialSelect = document.getElementById('socialSelect');
    const arsenalSelect = document.getElementById('arsenalSelect');

    function updateAgentLabel() {
      if (currentAgent !== 'general') {
        currentAgentLabel.textContent = agentNames[currentAgent] || currentAgent;
        currentAgentLabel.style.display = 'inline-block';
      } else {
        currentAgentLabel.style.display = 'none';
      }
    }

    function setAgent(agentId) {
      // Reset all buttons
      agentBtns.forEach(b => b.classList.remove('active'));
      socialSelect.value = '';
      arsenalSelect.value = '';

      // Set new agent
      currentAgent = agentId;
      conversationHistory = [];

      // Highlight button if exists
      const btn = document.querySelector(`[data-agent="${agentId}"]`);
      if (btn) btn.classList.add('active');

      updateAgentLabel();
      addMessage(`Агент: ${agentNames[agentId] || agentId}`, 'assistant');
    }

    // Button agents
    agentBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.id === 'clearHistory') return;
        if (btn.dataset.agent) {
          setAgent(btn.dataset.agent);
        }
      });
    });

    // Dropdown agents
    socialSelect.addEventListener('change', (e) => {
      if (e.target.value) {
        setAgent(e.target.value);
      }
    });

    arsenalSelect.addEventListener('change', (e) => {
      if (e.target.value) {
        setAgent(e.target.value);
      }
    });

    updateAgentLabel();

    // Send message
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // Use brainstorm mode if active
      if (brainstormMode) {
        return sendBrainstorm(text);
      }

      addMessage(text, 'user');
      messageInput.value = '';
      sendBtn.disabled = true;

      // Add typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant typing';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      chatContainer.appendChild(typingDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      try {
        console.log('Sending request to /.netlify/functions/chat');
        const response = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Cache-Control': 'no-cache, no-store',
            'Pragma': 'no-cache'
          },
          body: JSON.stringify({
            message: text,
            agent: currentAgent,
            systemPrompt: agentPrompts[currentAgent],
            history: conversationHistory.slice(-10),
            youtubeData: currentAgent === 'youtube' ? youtubeAnalytics : null
          })
        });

        console.log('Response status:', response.status);

        // Check if response is JSON
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const textResponse = await response.text();
          console.error('Non-JSON response:', textResponse.substring(0, 200));
          typingDiv.remove();
          if (response.status === 504 || textResponse.includes('timeout')) {
            addMessage('Превышено время ожидания. Попробуйте более простой запрос.', 'assistant');
          } else {
            addMessage('Ошибка сервера. Попробуйте позже.', 'assistant');
          }
          sendBtn.disabled = false;
          return;
        }

        const data = await response.json();
        console.log('Response data:', data);

        // Remove typing indicator
        typingDiv.remove();

        if (data.error) {
          addMessage('Ошибка: ' + data.error, 'assistant');
        } else {
          addMessage(data.response, 'assistant');
          conversationHistory.push({ role: 'user', content: text });
          conversationHistory.push({ role: 'assistant', content: data.response });
        }
      } catch (error) {
        console.error('Fetch error:', error);
        typingDiv.remove();
        if (error.message.includes('Unexpected token')) {
          addMessage('Ошибка обработки ответа. Попробуйте ещё раз.', 'assistant');
        } else {
          addMessage('Ошибка соединения: ' + error.message, 'assistant');
        }
      }

      sendBtn.disabled = false;
      messageInput.focus();
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      // Clean text parsing - remove markdown, keep links clickable
      let html = text
        .replace(/```[\s\S]*?```/g, '')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/^#{1,6}\s+/gm, '')
        .replace(/\*\*([^*]+)\*\*/g, '$1')
        .replace(/\*([^*]+)\*/g, '$1')
        .replace(/^[-*+]\s+/gm, '• ')
        .replace(/^\d+\.\s+/gm, '')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#213555;text-decoration:underline">$1</a>')
        .replace(/\n/g, '<br>');

      div.innerHTML = html;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Clear history button
    document.getElementById('clearHistory').addEventListener('click', () => {
      conversationHistory = [];
      chatContainer.innerHTML = '<div class="message assistant">История очищена. Выбери агента и начни новый диалог.</div>';
    });

    // Brainstorm mode
    let brainstormMode = false;
    const brainstormBtn = document.getElementById('brainstormBtn');

    brainstormBtn.addEventListener('click', () => {
      brainstormMode = !brainstormMode;
      brainstormBtn.classList.toggle('active', brainstormMode);

      // Reset other selections
      agentBtns.forEach(b => {
        if (b !== brainstormBtn) b.classList.remove('active');
      });
      socialSelect.value = '';
      arsenalSelect.value = '';

      if (brainstormMode) {
        currentAgent = 'brainstorm';
        currentAgentLabel.textContent = 'Мозгоштурм';
        currentAgentLabel.style.display = 'inline-block';
        addMessage('Режим мозгоштурма активирован! Все агенты обсудят вопрос вместе.', 'assistant');
      } else {
        currentAgent = 'general';
        document.querySelector('[data-agent="general"]').classList.add('active');
        currentAgentLabel.style.display = 'none';
      }
      conversationHistory = [];
    });

    // Brainstorm function - all agents discuss together
    async function sendBrainstorm(text) {
      addMessage(text, 'user');
      messageInput.value = '';
      sendBtn.disabled = true;

      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant typing';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      chatContainer.appendChild(typingDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      try {
        const response = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            agent: 'brainstorm',
            systemPrompt: '',
            history: conversationHistory.slice(-6)
          })
        });

        typingDiv.remove();
        const data = await response.json();

        if (data.error) {
          addMessage('Ошибка: ' + data.error, 'assistant');
        } else {
          addMessage(data.response, 'assistant');
          conversationHistory.push({ role: 'user', content: text });
          conversationHistory.push({ role: 'assistant', content: data.response });
        }
      } catch (error) {
        typingDiv.remove();
        addMessage('Ошибка: ' + error.message, 'assistant');
      }

      sendBtn.disabled = false;
      messageInput.focus();
    }

    // YouTube connection status
    const ytConnected = document.cookie.includes('yt_connected=true') || window.location.search.includes('youtube=connected');

    // Fetch YouTube analytics for AI context
    async function fetchYouTubeAnalytics() {
      try {
        const response = await fetch('/.netlify/functions/youtube-analytics', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_analytics' })
        });
        if (!response.ok) {
          // Silently handle - YouTube not connected
          return;
        }
        const data = await response.json();
        if (!data.error) {
          youtubeAnalytics = data;
          console.log('YouTube analytics loaded');
        }
      } catch (e) {
        // Silently ignore - YouTube not available
      }
    }

    // Only fetch if explicitly connected via URL callback
    if (window.location.search.includes('youtube=connected')) {
      fetchYouTubeAnalytics();
    }

    // Check URL for YouTube connection success
    if (window.location.search.includes('youtube=connected')) {
      addMessage('YouTube успешно подключён! Теперь я могу анализировать твою аналитику. Спроси что-нибудь о канале.', 'assistant');
      window.history.replaceState({}, '', '/');
    }

    // Unregister old service workers to fix caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(registration => {
          registration.unregister();
          console.log('Service Worker unregistered');
        });
      });
    }
  </script>
